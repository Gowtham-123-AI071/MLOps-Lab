stages:
  ingest:
    cmd: py -m src.ingest
    deps:
      - src/ingest.py
      - data/raw/ratings.csv
    outs:
      - data/processed/ratings_clean.csv

  features:
    cmd: py -m src.prepare_features data/processed/ratings_clean.csv models
    deps:
      - src/features.py
      - src/prepare_features.py
      - data/processed/ratings_clean.csv
    outs:
      - models/rating_features.pkl